<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acme Workspace - Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="logo">
                    <i class="fas fa-rocket"></i>
                </div>
                <h1>Bem-vindo de volta</h1>
                <p>Faça login no Acme Workspace</p>
            </div>
            
            <form method="post" action="/login" id="loginForm">
                <div class="form-group">
                    <label for="email">E-mail corporativo</label>
                    <div class="input-icon">
                        <i class="fas fa-envelope"></i>
                        <input type="email" 
                               id="email" 
                               name="email" 
                               placeholder="seu@email.com" 
                               required 
                               autocomplete="email">
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="password">Senha</label>
                    <div class="input-icon">
                        <i class="fas fa-lock"></i>
                        <input type="password" 
                               id="password" 
                               name="password" 
                               placeholder="••••••••" 
                               required 
                               autocomplete="current-password">
                    </div>
                    <div class="password-strength-meter">
                        <div class="password-strength"></div>
                    </div>
                </div>
                
                <div class="form-options">
                    <label class="checkbox">
                        <input type="checkbox" name="remember">
                        <span>Lembrar de mim</span>
                    </label>
                    <a href="#" class="forgot-link">Esqueceu a senha?</a>
                </div>
                
                <button type="submit" class="btn-login">
                    <span>Entrar</span>
                    <i class="fas fa-arrow-right"></i>
                </button>
            </form>
            
            <div class="login-footer">
                <p>Ou continue com</p>
                <div class="sso-options">
                    <button class="sso-btn" data-tooltip="Google">
                        <i class="fab fa-google"></i>
                    </button>
                    <button class="sso-btn" data-tooltip="Microsoft">
                        <i class="fab fa-microsoft"></i>
                    </button>
                    <button class="sso-btn" data-tooltip="GitHub">
                        <i class="fab fa-github"></i>
                    </button>
                    <button class="sso-btn" data-tooltip="Slack">
                        <i class="fab fa-slack"></i>
                    </button>
                </div>
            </div>
            
            <div style="text-align: center; margin-top: 2rem; font-size: 0.75rem; color: var(--gray);">
                <i class="fas fa-shield-alt"></i> Ambiente Seguro • Certificado SSL válido
            </div>
        </div>
    </div>
    
    <script src="/static/js/main.js"></script>
</body>
</html>

<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Círculo de fundo com gradiente suave -->
    <circle cx="50" cy="50" r="45" fill="url(#avatarGradient)" />
    
    <!-- Silhueta da cabeça e ombros -->
    <circle cx="50" cy="35" r="15" fill="white" fill-opacity="0.9" />
    
    <!-- Corpo (formato de camisa) -->
    <path d="M25 75C25 65 35 55 50 55C65 55 75 65 75 75H25Z" fill="white" fill-opacity="0.9" />
    
    <!-- Olhos estilizados -->
    <circle cx="40" cy="32" r="2" fill="#6366F1" />
    <circle cx="60" cy="32" r="2" fill="#6366F1" />
    
    <!-- Sorriso -->
    <path d="M40 45 Q50 52 60 45" stroke="#6366F1" stroke-width="2" stroke-linecap="round" fill="none"/>
    
    <!-- Ícone de usuário pequeno para versão mini -->
    <circle cx="50" cy="50" r="20" fill="white" fill-opacity="0.1" />
    
    <defs>
        <linearGradient id="avatarGradient" x1="5" y1="5" x2="95" y2="95" gradientUnits="userSpaceOnUse">
            <stop stop-color="#818CF8"/>
            <stop offset="1" stop-color="#C084FC"/>
        </linearGradient>
    </defs>
</svg>
